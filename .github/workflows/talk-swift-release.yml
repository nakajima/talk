name: TalkSwift XCFramework release

on:
  push:
    tags:
      - "**"
  workflow_dispatch:
    inputs:
      tag:
        description: "Base release tag to package, for example 0.1.33"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: talk-swift-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish TalkC.xcframework
    runs-on: macos-14
    if: ${{ github.event_name == 'workflow_dispatch' || !endsWith(github.ref_name, '-swift') }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive Swift release tag
        id: tags
        shell: bash
        env:
          BASE_TAG_INPUT: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          base_tag="${BASE_TAG_INPUT:-${GITHUB_REF_NAME}}"
          if [[ "$base_tag" == *-swift ]]; then
            echo "::error::base tag must not end with -swift: ${base_tag}"
            exit 1
          fi
          swift_tag="${base_tag}-swift"
          base_sha="$(git rev-list -n 1 "$base_tag")"
          git checkout --detach "$base_sha"
          echo "base_tag=${base_tag}" >> "$GITHUB_OUTPUT"
          echo "swift_tag=${swift_tag}" >> "$GITHUB_OUTPUT"
          echo "base_sha=${base_sha}" >> "$GITHUB_OUTPUT"
          echo "Base tag: ${base_tag}"
          echo "Base SHA: ${base_sha}"
          echo "Swift tag: ${swift_tag}"

      - name: Reject existing Swift tag
        shell: bash
        env:
          SWIFT_TAG: ${{ steps.tags.outputs.swift_tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${SWIFT_TAG}" >/dev/null 2>&1; then
            echo "::error::tag already exists: ${SWIFT_TAG}"
            exit 1
          fi

      - name: Build TalkC.xcframework
        run: ./talk-swift/scripts/build-xcframework.sh

      - name: Zip XCFramework
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cd talk-swift/Artifacts
          ditto -c -k --sequesterRsrc --keepParent TalkC.xcframework ../../dist/TalkC.xcframework.zip

      - name: Compute SwiftPM checksum
        id: checksum
        shell: bash
        run: |
          set -euo pipefail
          checksum="$(swift package compute-checksum dist/TalkC.xcframework.zip)"
          echo "checksum=${checksum}" >> "$GITHUB_OUTPUT"
          echo "TalkC.xcframework.zip checksum: ${checksum}"

      - name: Stamp root Package.swift for the Swift release tag
        shell: bash
        env:
          SWIFT_TAG: ${{ steps.tags.outputs.swift_tag }}
          REPOSITORY: ${{ github.repository }}
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          package = Path("Package.swift")
          text = package.read_text()
          url = f"https://github.com/{os.environ['REPOSITORY']}/releases/download/{os.environ['SWIFT_TAG']}/TalkC.xcframework.zip"
          checksum = os.environ["CHECKSUM"]
          text = re.sub(
              r'let talkCReleaseURL = "[^"]*"',
              f'let talkCReleaseURL = "{url}"',
              text,
          )
          text = re.sub(
              r'let talkCReleaseChecksum = "[0-9a-fA-F]*"',
              f'let talkCReleaseChecksum = "{checksum}"',
              text,
          )
          package.write_text(text)
          PY
          git diff -- Package.swift

      - name: Create and push Swift tag commit
        shell: bash
        env:
          SWIFT_TAG: ${{ steps.tags.outputs.swift_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "TalkSwift package ${SWIFT_TAG}"
          git tag "${SWIFT_TAG}"
          git push origin "refs/tags/${SWIFT_TAG}"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_TAG: ${{ steps.tags.outputs.base_tag }}
          SWIFT_TAG: ${{ steps.tags.outputs.swift_tag }}
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          set -euo pipefail
          cat > dist/release-notes.md <<EOF
          TalkSwift binary dependency for ${BASE_TAG}.

          SwiftPM checksum:

          \`\`\`
          ${CHECKSUM}
          \`\`\`
          EOF

          gh release create \
            "${SWIFT_TAG}" \
            "dist/TalkC.xcframework.zip" \
            --title "TalkSwift ${SWIFT_TAG}" \
            --notes-file "dist/release-notes.md" \
            --prerelease
