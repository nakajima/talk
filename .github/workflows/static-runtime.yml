name: Static runtime archives

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to, for example v0.1.21
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install Rust target
        run: rustup toolchain install nightly --profile minimal --target "${{ matrix.target }}"

      - name: Build static runtime
        run: cargo +nightly build -p talk-static --release --locked --target "${{ matrix.target }}"

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist
          asset="dist/libtalk_static-${{ matrix.target }}.a"
          cp "target/${{ matrix.target }}/release/libtalk_static.a" "$asset"
          shasum -a 256 "$asset" > "$asset.sha256"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$TAG" dist/libtalk_static-${{ matrix.target }}.a dist/libtalk_static-${{ matrix.target }}.a.sha256 --clobber
